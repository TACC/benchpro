[requirements]
code = cm1-lofs
version =
build_label = 
[runtime]
nodes = 2
ranks_per_node = 8 
threads = 7 
[config]
#bench_label = <<<code>>>_<<<bench_run>>> # <--- this doesn't work when searching for benchmarks with -b 
bench_label = cm1-lofs_strong100-2node
template = <<<code>>>
# this dataset includes all strong100 inputs, 1node-4node
dataset = strong100
bench_run = strong100-<<<nodes>>>node
collect_stats = True
[files]
local = <<<code>>>_<<<dataset>>>.tgz
[result]
output_file = <<<bench_run>>>.out
method = script
script = get_cm1_output.sh
unit = seconds
